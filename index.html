<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>UZnav</title>
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <h1 class="app-title">UZnav</h1>
        <div class="gps-indicator">
          <span id="gps-status" class="gps-status">GPS...</span>
          <button id="lang-toggle" class="lang-toggle" aria-label="Toggle language">RU</button>
          <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
            <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
            <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Search -->
      <div class="search-container">
        <input
          id="search-input"
          type="text"
          data-i18n="searchPlaceholder"
          placeholder="Search city or address..."
          autocomplete="off"
          enterkeyhint="search"
        />
        <button id="search-btn" class="btn-primary" aria-label="Search">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
          </svg>
        </button>
      </div>

      <!-- POI Category Chips -->
      <div class="poi-categories">
        <button class="poi-chip" data-poi="cafe" data-i18n="poiCafe">☕ Cafe</button>
        <button class="poi-chip" data-poi="restaurant" data-i18n="poiRestaurant">🍽️ Restaurant</button>
        <button class="poi-chip" data-poi="fuel" data-i18n="poiFuel">⛽ Gas</button>
        <button class="poi-chip" data-poi="pharmacy" data-i18n="poiPharmacy">💊 Pharmacy</button>
        <button class="poi-chip" data-poi="atm" data-i18n="poiAtm">🏧 ATM</button>
        <button class="poi-chip" data-poi="parking" data-i18n="poiParking">🅿️ Parking</button>
      </div>

      <!-- Search Results -->
      <ul id="search-results" class="search-results hidden"></ul>

      <!-- Map Layers -->
      <div class="layers-section">
        <label class="toggle-label">
          <input type="checkbox" id="traffic-toggle" />
          <span class="toggle-switch"></span>
          <span data-i18n="traffic">Traffic</span>
        </label>
        <label class="toggle-label">
          <input type="checkbox" id="radars-toggle" checked />
          <span class="toggle-switch"></span>
          <span data-i18n="speedCameras">Speed cameras</span>
        </label>
      </div>

      <!-- Route Options -->
      <div class="layers-section">
        <h2 class="section-title" data-i18n="routeOptions">Route options</h2>
        <label class="toggle-label">
          <input type="checkbox" id="avoid-highways-toggle" />
          <span class="toggle-switch"></span>
          <span data-i18n="avoidHighways">Avoid highways</span>
        </label>
        <label class="toggle-label">
          <input type="checkbox" id="avoid-tolls-toggle" />
          <span class="toggle-switch"></span>
          <span data-i18n="avoidTolls">Avoid tolls</span>
        </label>
        <label class="toggle-label">
          <input type="checkbox" id="avoid-ferries-toggle" />
          <span class="toggle-switch"></span>
          <span data-i18n="avoidFerries">Avoid ferries</span>
        </label>
      </div>

      <!-- Waypoints -->
      <div class="waypoints-section">
        <div class="section-header">
          <h2 class="section-title" data-i18n="routeSection">Route</h2>
          <button id="clear-route-btn" class="btn-danger-sm" data-i18n="clearBtn">Clear</button>
        </div>
        <ul id="waypoints-list" class="waypoints-list"></ul>
        <p class="hint-text" data-i18n="longPressHint">Long press on map to add a waypoint</p>
      </div>

      <!-- Route Summary -->
      <div id="route-summary" class="route-summary hidden">
        <div class="summary-stats">
          <div class="stat">
            <span class="stat-label" data-i18n="distanceLabel">Distance</span>
            <span id="total-distance" class="stat-value">--</span>
          </div>
          <div class="stat">
            <span class="stat-label" data-i18n="timeLabel">Est. Time</span>
            <span id="total-time" class="stat-value">--</span>
          </div>
        </div>
        <button id="start-nav-btn" class="btn-start-nav" data-i18n="startBtn">Start</button>
      </div>

      <!-- Directions -->
      <div id="directions-container" class="directions-container hidden">
        <h2 class="section-title" data-i18n="directionsTitle">Directions</h2>
        <ol id="directions-list" class="directions-list"></ol>
      </div>

      <!-- Attribution -->
      <div class="attribution">
        &copy; <a href="https://www.openstreetmap.org/copyright" target="_blank">OpenStreetMap</a> contributors
      </div>
    </aside>

    <!-- Sidebar Toggle -->
    <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Toggle sidebar">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>

    <!-- Map -->
    <div id="map"></div>

    <!-- Locate / Follow GPS Button -->
    <button id="locate-btn" class="locate-btn" aria-label="Center on GPS">
      <svg class="locate-icon-default" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/>
      </svg>
      <svg class="locate-icon-heading" width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 2L4.5 20.3l.7.7L12 18l6.8 3 .7-.7z"/>
      </svg>
    </button>

    <!-- Speed Display -->
    <div id="speed-display" class="speed-display hidden">
      <span id="speed-value" class="speed-value">0</span>
      <span class="speed-unit" data-i18n="kmhUnit">km/h</span>
    </div>

    <!-- Navigation HUD (Waze-like driving overlay) -->
    <div id="nav-hud" class="nav-hud hidden">
      <div class="nav-hud-top">
        <div id="nav-maneuver-icon" class="nav-maneuver-icon"></div>
        <div class="nav-maneuver-info">
          <span id="nav-distance-to-turn" class="nav-distance-to-turn"></span>
          <span id="nav-instruction" class="nav-instruction"></span>
        </div>
        <button id="nav-edit-btn" class="nav-edit-btn" aria-label="Edit route">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
        </button>
        <button id="nav-exit-btn" class="nav-exit-btn" aria-label="Exit navigation">&times;</button>
      </div>
      <div class="nav-hud-bottom">
        <div class="nav-stat">
          <span id="nav-eta" class="nav-stat-value"></span>
          <span class="nav-stat-label" data-i18n="etaLabel">ETA</span>
        </div>
        <div class="nav-stat">
          <span id="nav-remaining" class="nav-stat-value"></span>
          <span class="nav-stat-label" data-i18n="leftLabel">Left</span>
        </div>
        <div class="nav-stat">
          <span id="nav-speed" class="nav-stat-value">0</span>
          <span class="nav-stat-label" data-i18n="kmhUnit">km/h</span>
        </div>
        <div id="nav-speed-limit-container" class="nav-speed-limit hidden">
          <span id="nav-speed-limit"></span>
        </div>
      </div>
    </div>
    <!-- Place Card (Waze-like bottom sheet) -->
    <div id="place-card" class="place-card hidden">
      <div class="place-card-handle"></div>
      <div class="place-card-body">
        <span id="place-card-icon" class="place-card-icon-badge"></span>
        <div class="place-card-text">
          <h3 id="place-card-name" class="place-card-name"></h3>
          <p id="place-card-sub" class="place-card-sub"></p>
        </div>
        <button id="place-card-close" class="place-card-close" aria-label="Close">&times;</button>
      </div>
      <div class="place-card-actions">
        <button id="place-card-route-btn" class="btn-start-nav">Route Here</button>
      </div>
    </div>
  </div>

  <!-- Mock GPS for local testing: ?mock-gps (Tashkent) or ?mock-gps-us (San Francisco) -->
  <script>
  if (location.search.includes('mock-gps')) {
    (function() {
      var isUS = location.search.includes('mock-gps-us');
      var lat = isUS ? 37.7749 : 41.3110;
      var lng = isUS ? -122.4194 : 69.2795;
      var heading = 30, speed = 16.67;
      var cbs = [];
      function pos() {
        return { coords: { latitude: lat, longitude: lng, speed: speed, heading: heading, accuracy: 5, altitude: null, altitudeAccuracy: null }, timestamp: Date.now() };
      }
      navigator.geolocation.getCurrentPosition = function(s) { setTimeout(function(){ s(pos()); }, 500); };
      navigator.geolocation.watchPosition = function(s) {
        cbs.push(s);
        setTimeout(function(){ s(pos()); }, 600);
        return 999;
      };
      navigator.geolocation.clearWatch = function() {};
      setInterval(function() {
        lat += 0.00015;
        lng += isUS ? -0.00020 : 0.00020;
        heading = (heading + 3) % 360;
        speed = 14 + Math.random() * 6;
        var p = pos();
        cbs.forEach(function(cb) { cb(p); });
      }, 2000);
      console.log('Mock GPS active: ' + (isUS ? 'San Francisco' : 'Tashkent') + ', ~60 km/h');
    })();
  }
  </script>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
